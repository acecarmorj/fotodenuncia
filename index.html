<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e5661a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>ClickCidade</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/clickcidade-app-icon.png">
  <link rel="stylesheet" href="./assets/styles.css?v=20260627-map-colors">
</head>
<body class="citizen-page">
  <main class="citizen-shell">
    <header class="citizen-header">
      <div>
        <span class="brand-mark" aria-label="ClickCidade"></span>
        <h1>ClickCidade</h1>
        <p>FotoDenuncia de lixo, foco de dengue e terreno baldio.</p>
        <button class="secondary-button install-button" type="button" id="installButton" hidden>Instalar ClickCidade</button>
      </div>
    </header>

    <form class="citizen-form" id="reportForm">
      <section class="citizen-card">
        <label class="field-label" for="photoInput">Foto</label>
        <input id="photoInput" class="file-input" type="file" accept="image/*" capture="environment" required>
        <button class="photo-button" type="button" id="photoButton">Tirar ou escolher foto</button>
        <img class="photo-preview" id="photoPreview" alt="Previa da denuncia" hidden>
      </section>

      <section class="citizen-card">
        <span class="field-label">Tipo</span>
        <div class="type-grid" role="radiogroup" aria-label="Tipo da denuncia">
          <label class="type-option">
            <input type="radio" name="category" value="lixo" checked>
            <span>Lixo</span>
          </label>
          <label class="type-option">
            <input type="radio" name="category" value="dengue">
            <span>Foco de dengue</span>
          </label>
          <label class="type-option">
            <input type="radio" name="category" value="terreno">
            <span>Terreno baldio</span>
          </label>
        </div>
      </section>

      <section class="citizen-card">
        <div class="location-row">
          <div>
            <span class="field-label">Localizacao</span>
            <p id="locationStatus">Aguardando GPS.</p>
          </div>
          <button class="secondary-button" type="button" id="locationButton">Usar GPS</button>
        </div>
        <label class="field-label small-label" for="referenceInput">Referencia, se precisar</label>
        <textarea id="referenceInput" rows="2" maxlength="240" placeholder="Ex.: perto da escola, rua, bairro ou ponto conhecido"></textarea>
      </section>

      <section class="citizen-card">
        <label class="field-label" for="citizenNameInput">Nome opcional</label>
        <input id="citizenNameInput" type="text" maxlength="120" autocomplete="name" placeholder="Como podemos chamar voce?">
        <label class="field-label" for="phoneInput">Telefone opcional</label>
        <input id="phoneInput" type="tel" maxlength="40" inputmode="tel" placeholder="(22) 99999-9999">
      </section>

      <button class="primary-button submit-button" type="submit" id="submitButton">Enviar denuncia</button>
      <p class="form-message" id="formMessage" role="status"></p>
    </form>

    <section class="citizen-receipt" id="receiptPanel" aria-live="polite" hidden>
      <span class="receipt-check" aria-hidden="true">&#10003;</span>
      <p class="receipt-eyebrow">Denuncia recebida</p>
      <h2 id="receiptProtocol"></h2>
      <p id="receiptDate"></p>
      <p class="receipt-note">Guarde este protocolo para acompanhar o atendimento.</p>
      <div class="receipt-actions">
        <button class="primary-button" type="button" id="shareReceiptButton">Compartilhar protocolo</button>
        <button class="secondary-button" type="button" id="newReportButton">Fazer outra denuncia</button>
      </div>
      <p class="form-message" id="receiptMessage" role="status"></p>
    </section>
  </main>

  <script src="./assets/runtime-config.js?v=20260627-map-colors"></script>
  <script src="./assets/app.js?v=20260627-map-colors"></script>
</body>
</html>
